<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>the Last Train | v3.1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #313131;
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      position: relative;
      width: 375px;
      min-height: 100vh;
      background: #313131;
      overflow: hidden;
    }

    /* ============ Loading / splash screen ============ */
    .splash {
      position: absolute;
      inset: 0;
      z-index: 50;
      background: #313131;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 32px;
      cursor: pointer;
      transition: opacity 0.6s ease;
    }
    .splash.hide { opacity: 0; pointer-events: none; }

    .splash-zh {
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 300;
      font-size: 15px;
      line-height: 1.9;
      color: #7d7d7d;
      letter-spacing: 1px;
    }
    .splash-en {
      margin-top: 14px;
      font-family: 'Manrope', sans-serif;
      font-weight: 700;
      font-size: 16px;
      line-height: 1.55;
      color: #e8e8e8;
    }
    .splash-hint {
      position: absolute;
      bottom: 48px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #5a5a5a;
      text-transform: uppercase;
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:.85} }

    /* ============ Main UI ============ */
    .ui { opacity: 0; transition: opacity 0.6s ease; }
    .ui.show { opacity: 1; }

    /* Header label */
    .header {
      position: absolute;
      top: 157px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .header-icon {
      width: 23px;
      height: 23px;
      border: 2px solid #a7a7a7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a7a7a7;
      font-size: 11px;
      font-weight: 800;
      flex-shrink: 0;
    }
    /* The "A" rotates to point toward the station (device compass aware) */
    #compassA {
      display: inline-block;
      line-height: 1;
      transition: transform 0.15s linear;
      transform-origin: 50% 50%;
    }

    .header-label {
      font-size: 13px;
      font-weight: 800;
      color: #a7a7a7;
      letter-spacing: 0;
    }

    /* Countdown timer */
    .countdown {
      position: absolute;
      top: 190px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 86px;
      font-weight: 200;
      color: #28e08f;
      line-height: 1;
      white-space: nowrap;
      display: flex;
      align-items: baseline;
      letter-spacing: -4.3px;
    }

    .countdown .seg {
      display: inline-flex;
      justify-content: center;
      width: 80px;
      padding-left: 4.3px;
    }

    .countdown .colon {
      display: inline-flex;
      justify-content: center;
      width: 22px;
    }
    .countdown .colon.hidden { opacity: 0; }

    /* Blink rule for colons outside the countdown (e.g. departure time) */
    .info-value .colon.hidden { opacity: 0; }

    /* Nearest station section */
    .nearest-label {
      position: absolute;
      top: 293px;
      left: 19px;
      font-size: 11px;
      font-weight: 800;
      color: #a7a7a7;
      letter-spacing: 0.5px;
    }

    .nearest-distance {
      position: absolute;
      top: 288px;
      right: 19px;
      font-size: 16px;
      font-weight: 700;
      line-height: 20px;
      white-space: nowrap;
    }

    .nearest-distance .dist-value { color: #dfa11b; }
    .nearest-distance .dist-unit  { color: #a7a7a7; }

    .station-badge {
      position: absolute;
      top: 312px;
      left: 19px;
      width: 337px;
      height: 46px;
      background: #181818;
      border-radius: 7.5px;
      overflow: hidden;
    }

    .station-name {
      font-size: 26px;
      font-weight: 600;
      color: #dfa11b;
      white-space: nowrap;
      position: absolute;
      left: 0;
      top: 50%;
      will-change: transform;
    }

    /* Info rows */
    .info-row {
      position: absolute;
      left: 19px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .info-label {
      font-size: 11px;
      font-weight: 800;
      color: #717171;
      line-height: 1.3;
      width: 56px;
      flex-shrink: 0;
      padding-top: 10px;
    }

    .info-value {
      font-size: 86px;
      font-weight: 200;
      color: #a7a7a7;
      letter-spacing: -4.3px;
      line-height: 1;
      white-space: nowrap;
    }

    .row-departure { top: 360px; }
    .row-bound     { top: 457px; }
    .row-train     { top: 554px; }

    /* Status line (errors / progress) */
    .status {
      position: absolute;
      bottom: 24px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #717171;
      padding: 0 24px;
      line-height: 1.5;
    }
    .status.err { color: #e0683f; }
  </style>
</head>
<body>
  <div class="app">

    <!-- ============ Splash / loading screen (Figma) ============ -->
    <div class="splash" id="splash">
      <div class="splash-zh">想你的時候<br>搭上最後一班的列車</div>
      <div class="splash-en">Thinking of you,<br>I catch the last train.</div>
      <div class="splash-hint">tap anywhere</div>
    </div>

    <!-- ============ Main UI ============ -->
    <div class="ui" id="ui">
      <!-- Header -->
      <div class="header">
        <div class="header-icon"><span id="compassA">A</span></div>
        <span class="header-label">the Last Train Departs in</span>
      </div>

      <!-- Countdown -->
      <div class="countdown" id="countdown">
        <span class="seg" id="cd-h">--</span><span class="colon" id="colon1">:</span><span class="seg" id="cd-m">--</span><span class="colon" id="colon2">:</span><span class="seg" id="cd-s">--</span>
      </div>

      <!-- Nearest Station -->
      <div class="nearest-label">Nearest Station</div>
      <div class="nearest-distance">
        <span class="dist-value" id="distValue">----m</span>
        <span class="dist-unit"> away from you</span>
      </div>
      <div class="station-badge">
        <span class="station-name" id="stationName">Locating…</span>
      </div>

      <!-- Departure -->
      <div class="info-row row-departure">
        <div class="info-label">Departure<br>at</div>
        <div class="info-value" id="depValue">--<span class="colon">:</span>--</div>
      </div>

      <!-- Bound For -->
      <div class="info-row row-bound">
        <div class="info-label">Bound<br>For</div>
        <div class="info-value" id="boundValue">—</div>
      </div>

      <!-- Train Number -->
      <div class="info-row row-train">
        <div class="info-label">Train<br>Number</div>
        <div class="info-value" id="trainValue">—</div>
      </div>

      <div class="status" id="status"></div>
    </div>

  </div>

  <script>
  /* ====================================================================
     TDX 交通部運輸資料流通服務 — API 金鑰 (請填入你自己的值)
     申請：https://tdx.transportdata.tw/ → 會員中心 → 金鑰管理
     ==================================================================== */
  const TDX_CLIENT_ID     = 'ethanchen1984-04c214cd-35f4-4327';      // ← 你的 Client ID
  const TDX_CLIENT_SECRET = '95e6313d-b65c-4e02-aa94-e00245c292df';  // ← 你的 Client Secret
  /* ==================================================================== */

  const TDX_AUTH_URL = 'https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token';
  const TDX_API_BASE = 'https://tdx.transportdata.tw/api/basic';

  // ---- DOM refs ----
  const $ = (id) => document.getElementById(id);
  const splashEl = $('splash');
  const uiEl = $('ui');
  const statusEl = $('status');

  let userLat = null, userLon = null;
  let targetStation = null;      // {id,name,lat,lon}
  let stationBearing = null;     // bearing from user → station (deg, 0=N)
  let deviceHeading = null;      // compass heading of device (deg, 0=N)
  let departureTime = null;      // "HH:MM"

  function setStatus(msg, isErr) {
    statusEl.textContent = msg || '';
    statusEl.classList.toggle('err', !!isErr);
  }

  /* ---------- Geometry helpers ---------- */
  const toRad = (d) => d * Math.PI / 180;
  const toDeg = (r) => r * 180 / Math.PI;

  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000; // m
    const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  function bearing(lat1, lon1, lat2, lon2) {
    const y = Math.sin(toRad(lon2 - lon1)) * Math.cos(toRad(lat2));
    const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
              Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1));
    return (toDeg(Math.atan2(y, x)) + 360) % 360;
  }

  /* ---------- Compass arrow ---------- */
  function updateArrow() {
    if (stationBearing == null) return;
    // If we have device heading, point relative to where the phone faces;
    // otherwise just point to the absolute bearing (north-up).
    const rel = deviceHeading == null ? stationBearing
                                      : (stationBearing - deviceHeading + 360) % 360;
    $('compassA').style.transform = `rotate(${rel}deg)`;
  }

  /* ---------- Nearest station ---------- */
  async function findNearestStation() {
    const res = await fetch('stations.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('無法讀取 stations.json');
    const stations = await res.json();

    let best = null, bestD = Infinity;
    for (const s of stations) {
      const d = haversine(userLat, userLon, s.lat, s.lon);
      if (d < bestD) { bestD = d; best = s; }
    }
    targetStation = best;
    targetStation.distance = bestD;
    stationBearing = bearing(userLat, userLon, best.lat, best.lon);
    updateArrow();
    return best;
  }

  /* ---------- TDX auth + timetable ---------- */
  async function getTdxToken() {
    const body = new URLSearchParams({
      grant_type: 'client_credentials',
      client_id: TDX_CLIENT_ID,
      client_secret: TDX_CLIENT_SECRET
    });
    const res = await fetch(TDX_AUTH_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/x-www-form-urlencoded' },
      body
    });
    if (!res.ok) throw new Error('TDX 授權失敗 (' + res.status + ')');
    const j = await res.json();
    if (!j.access_token) throw new Error('TDX 未回傳 access_token');
    return j.access_token;
  }

  function localDateStr() {
    const n = new Date();
    const p = (x) => String(x).padStart(2, '0');
    return `${n.getFullYear()}-${p(n.getMonth() + 1)}-${p(n.getDate())}`;
  }

  const pickName = (v) => (v && typeof v === 'object') ? (v.En || v.Zh_tw || '') : (v || '');

  // Flatten any TDX timetable response shape → [{dep, trainNo, boundFor}]
  // Handles: v3 DailyStationTimetable, v3 DailyTrainTimetable, v2 array.
  function extractTrains(data, stationId) {
    const out = [];
    const push = (dep, trainNo, boundFor) => {
      if (dep && trainNo) out.push({ dep: String(dep).slice(0, 5), trainNo: String(trainNo), boundFor: boundFor || '' });
    };

    // Shape A — v3 DailyStationTimetable: { StationTimetables:[{ Direction, TimeTables:[...] }] }
    const stns = data && (data.StationTimetables || data.StationTimetable);
    if (Array.isArray(stns)) {
      for (const stt of stns) {
        const rows = stt.TimeTables || stt.Timetables || stt.TimeTable || [];
        for (const t of rows) {
          const dep = t.DepartureTime || t.ArrivalTime;
          const boundFor = pickName(t.EndingStationName || t.DestinationStationName || stt.EndingStationName);
          push(dep, t.TrainNo, boundFor);
        }
      }
    }

    // Shape B — v3 DailyTrainTimetable: { TrainTimetables:[{ TrainInfo, StopTimes:[...] }] }
    const tts = data && data.TrainTimetables;
    if (Array.isArray(tts)) {
      for (const item of tts) {
        const info = item.TrainInfo || item.DailyTrainInfo || {};
        const stops = item.StopTimes || [];
        const st = stops.find(s => String(s.StationID) === String(stationId)) || stops[0];
        const dep = st && (st.DepartureTime || st.ArrivalTime);
        push(dep, info.TrainNo, pickName(info.EndingStationName));
      }
    }

    // Shape C — v2 array: [{ DailyTrainInfo, StopTime:{...} }]
    if (Array.isArray(data)) {
      for (const item of data) {
        const info = item.DailyTrainInfo || item.TrainInfo || {};
        const st = item.StopTime || (Array.isArray(item.StopTimes) ? item.StopTimes[0] : null) || {};
        const dep = st.DepartureTime || st.ArrivalTime;
        push(dep, info.TrainNo, pickName(info.EndingStationName));
      }
    }
    return out;
  }

  async function fetchTimetable(token, url) {
    const res = await fetch(url, { headers: { authorization: 'Bearer ' + token } });
    if (!res.ok) return { ok: false, status: res.status };
    return { ok: true, data: await res.json() };
  }

  async function fetchLastTrain(token, stationId) {
    const date = localDateStr();
    // v2 Rail TRA endpoints have been deprecated → try v3 station timetable first.
    const urls = [
      `${TDX_API_BASE}/v3/Rail/TRA/DailyStationTimetable/TrainDate/${date}/Station/${stationId}?$format=JSON`,
      `${TDX_API_BASE}/v3/Rail/TRA/DailyStationTimetable/Today/Station/${stationId}?$format=JSON`,
      `${TDX_API_BASE}/v3/Rail/TRA/DailyTrainTimetable/TrainDate/${date}/Station/${stationId}?$format=JSON`,
      `${TDX_API_BASE}/v2/Rail/TRA/DailyTrainTimetable/Station/${stationId}/${date}?$format=JSON`,
    ];

    let trains = [], lastStatus = 'no data';
    for (const url of urls) {
      try {
        const r = await fetchTimetable(token, url);
        if (!r.ok) { lastStatus = r.status; continue; }
        trains = extractTrains(r.data, stationId);
        if (trains.length) break;
      } catch (e) { lastStatus = e.message; }
    }
    if (!trains.length) throw new Error('TDX 時刻表查詢失敗 (' + lastStatus + ')');

    // Latest departure of the day (lexical max on "HH:MM"), up or down bound.
    let latest = trains[0];
    for (const t of trains) if (t.dep > latest.dep) latest = t;
    return latest;
  }

  /* ---------- Countdown ---------- */
  let colonVisible = true;
  let countdownTimer = null;

  function startCountdown() {
    if (!departureTime) return;
    const [depH, depM] = departureTime.split(':').map(Number);

    function secondsUntil() {
      const now = new Date();
      const dep = new Date();
      dep.setHours(depH, depM, 0, 0);
      if (dep <= now) dep.setDate(dep.getDate() + 1);
      return Math.max(0, Math.floor((dep - now) / 1000));
    }
    function tick() {
      const s = secondsUntil();
      $('cd-h').textContent = String(Math.floor(s / 3600)).padStart(2, '0');
      $('cd-m').textContent = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
      $('cd-s').textContent = String(s % 60).padStart(2, '0');
      colonVisible = !colonVisible;
      document.querySelectorAll('.colon').forEach(el => el.classList.toggle('hidden', !colonVisible));
    }
    tick();
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(tick, 1000);
  }

  /* ---------- Populate UI ---------- */
  function setStationName(name) {
    $('stationName').textContent = name;
    if (window.__resetMarquee) window.__resetMarquee();
  }

  function setDepartureDisplay(hhmm) {
    const [h, m] = hhmm.split(':');
    $('depValue').innerHTML = `${h}<span class="colon">:</span>${m}`;
  }

  /* ---------- Sensors ---------- */
  function getPosition() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) return reject(new Error('此裝置不支援定位'));
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve(pos.coords),
        (err) => reject(new Error('定位被拒絕或失敗：' + err.message)),
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    });
  }

  function handleOrientation(e) {
    let heading = null;
    if (typeof e.webkitCompassHeading === 'number') {
      heading = e.webkitCompassHeading;            // iOS: already 0=N, clockwise
    } else if (e.absolute && typeof e.alpha === 'number') {
      heading = (360 - e.alpha) % 360;             // Android absolute
    } else if (typeof e.alpha === 'number') {
      heading = (360 - e.alpha) % 360;
    }
    if (heading != null && !Number.isNaN(heading)) {
      deviceHeading = heading;
      updateArrow();
    }
  }

  async function enableOrientation() {
    try {
      const DOE = window.DeviceOrientationEvent;
      if (DOE && typeof DOE.requestPermission === 'function') {
        const perm = await DOE.requestPermission();   // iOS 13+
        if (perm !== 'granted') return;
      }
      window.addEventListener('deviceorientationabsolute', handleOrientation, true);
      window.addEventListener('deviceorientation', handleOrientation, true);
    } catch (_) { /* compass optional */ }
  }

  /* ---------- Main flow (triggered by tap) ---------- */
  let started = false;
  async function start() {
    if (started) return;
    started = true;

    // Reveal UI, hide splash
    splashEl.classList.add('hide');
    uiEl.classList.add('show');

    // Compass needs the user gesture to request permission (iOS)
    enableOrientation();

    try {
      setStatus('定位中…');
      const coords = await getPosition();
      userLat = coords.latitude;
      userLon = coords.longitude;

      setStatus('搜尋最近車站…');
      const st = await findNearestStation();
      setStationName(st.name);
      $('distValue').textContent = Math.round(st.distance) + 'm';

      if (TDX_CLIENT_ID === 'YOUR_CLIENT_ID' || TDX_CLIENT_SECRET === 'YOUR_CLIENT_SECRET') {
        setStatus('請在程式碼頂端填入 TDX 金鑰以取得班次', true);
        return;
      }

      setStatus('查詢末班車…');
      const token = await getTdxToken();
      const last = await fetchLastTrain(token, st.id);

      departureTime = last.dep.slice(0, 5);           // "HH:MM"
      setDepartureDisplay(departureTime);
      $('boundValue').textContent = last.boundFor || '—';
      $('trainValue').textContent = last.trainNo || '—';
      startCountdown();
      setStatus('');
    } catch (err) {
      console.error(err);
      setStatus(err.message || '發生錯誤', true);
    }
  }

  splashEl.addEventListener('click', start);
  splashEl.addEventListener('touchend', (e) => { e.preventDefault(); start(); }, { passive: false });

  /* ---------- Station name marquee ---------- */
  (function () {
    const badge = document.querySelector('.station-badge');
    const text = $('stationName');
    const SPEED = 50, PAUSE = 3000, GAP = 24;
    let badgeW, textW, startX, centerX, endX, phase, phaseStart, pauseUntil;

    function measure() {
      badgeW = badge.clientWidth;
      textW = text.offsetWidth;
      startX = badgeW + GAP;
      centerX = (badgeW - textW) / 2;
      endX = -textW - GAP;
    }
    function setX(x) { text.style.transform = `translate(${x}px, -50%)`; }
    function reset(now) { measure(); phase = 'enter'; phaseStart = now; }
    function frame(now) {
      if (phase === 'enter') {
        const dist = startX - centerX, t = (now - phaseStart) / 1000 * SPEED;
        if (t >= dist) { setX(centerX); phase = 'pause'; pauseUntil = now + PAUSE; }
        else setX(startX - t);
      } else if (phase === 'pause') {
        setX(centerX);
        if (now >= pauseUntil) { phase = 'exit'; phaseStart = now; }
      } else if (phase === 'exit') {
        const dist = centerX - endX, t = (now - phaseStart) / 1000 * SPEED;
        if (t >= dist) reset(now); else setX(centerX - t);
      }
      requestAnimationFrame(frame);
    }
    function init() { measure(); setX(startX); reset(performance.now()); requestAnimationFrame(frame); }
    window.__resetMarquee = () => { measure(); reset(performance.now()); };

    if (document.fonts && document.fonts.ready) document.fonts.ready.then(init);
    else window.addEventListener('load', init);
    window.addEventListener('resize', measure);
  })();
  </script>
</body>
</html>
