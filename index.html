        body {
            margin: 0;
            padding: 0;
            background-color: #313131;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
            transition: background-color 0.5s ease;
        }

        #btn-miss-you {
            background-color: #ffffff;
            color: #313131;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(20px, 5vw, 24px); 
            letter-spacing: 2px; 
            border: none;
            border-radius: 999px;
            padding: 1em 3em; 
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, opacity 0.5s ease;
            line-height: 1;
            text-align: center;
        }

        #btn-miss-you:hover {
            transform: scale(1.05);
        }

        #result-container {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            text-align: center;
            width: 100vw;
            overflow: hidden; 
        }

        #subtitle {
            color: #8e8d8d;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(16px, 4vw, 24px);
            letter-spacing: 2px;
            margin-bottom: 10px; 
            position: relative;
            z-index: 10;
        }

        .marquee-wrapper {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
        }

        @keyframes scroll-left {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        #station-name {
            color: #6cdd96;
            font-family: 'Bitcount Single', 'Silkscreen', 'DotGothic16', monospace; 
            font-size: clamp(120px, 30vw, 620px); 
            font-weight: 400;
            margin: 0;
            text-transform: uppercase;
            line-height: 0.8; 
            display: inline-block;
            white-space: nowrap;
            padding-right: 50px;
            animation: scroll-left 15s linear infinite; 
        }

        #train-info {
            display: none; /* 初始隱藏，抓完資料後顯示 */
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 10;
        }

        .train-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
            backdrop-filter: blur(5px);
        }

        .train-direction {
            color: #8e8d8d;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .train-detail {
            color: #ffffff;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .train-time {
            color: #6cdd96;
            margin-right: 10px;
        }
    </style>

        // UI 元素
        const btn = document.getElementById('btn-miss-you');
        const resultContainer = document.getElementById('result-container');
        const stationNameEl = document.getElementById('station-name');
        const trainInfoEl = document.getElementById('train-info');
        
        const southTimeEl = document.getElementById('south-time');
        const southDestEl = document.getElementById('south-dest');
        const northTimeEl = document.getElementById('north-time');
        const northDestEl = document.getElementById('north-dest');

        // ==========================================
        // 2. 距離計算邏輯 (Haversine 公式)
        // ==========================================
        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }

        function deg2rad(deg) { return deg * (Math.PI / 180); }

        // ==========================================
        // 3. TDX API 串接與假資料產生器
        // ==========================================

        // 產生一組給展示用的假時刻表資料 (如果沒填金鑰就會用到)
        function getMockTrainData() {
            return {
                south: { time: '23:45', destination: 'CHAOZHOU' },
                north: { time: '23:58', destination: 'KEELUNG' }
            };
        }

        // 取得 TDX Access Token
        async function getTdxToken() {
            const tokenUrl = 'https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token';
            const params = new URLSearchParams();
            params.append('grant_type', 'client_credentials');
            params.append('client_id', TDX_CLIENT_ID);
            params.append('client_secret', TDX_CLIENT_SECRET);

            console.log('正在向 TDX 請求 Access Token...');
            try {
                const response = await fetch(tokenUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                const data = await response.json();
                if (data.access_token) {
                    console.log('✅ 成功取得 TDX Access Token!');
                } else {
                    console.warn('⚠️ 無法取得 Token，請檢查金鑰是否正確。', data);
                }
                return data.access_token;
            } catch (error) {
                console.error('❌ 獲取 TDX Token 發生網路錯誤:', error);
                return null;
            }
        }

        // 抓取指定車站今日時刻表，並找出最晚班次
        async function fetchLastTrains(stationId) {
            // 如果沒有填寫金鑰，直接回傳模擬資料展示排版效果
            if (!TDX_CLIENT_ID || !TDX_CLIENT_SECRET) {
                console.log("⚠️ 未提供 TDX 金鑰，將使用模擬時刻表資料展示畫面。");
                return getMockTrainData();
            }

            const token = await getTdxToken();
            if (!token) {
                console.log("⚠️ Token 取得失敗，切換為模擬資料。");
                return getMockTrainData(); 
            }

            // 取得今天的日期字串 YYYY-MM-DD
            const today = new Date();
            const dateString = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            
            // 呼叫 TDX 台鐵車站別時刻表 API
            const apiUrl = `https://tdx.transportdata.tw/api/basic/v2/Rail/TRA/DailyTimetable/Station/${stationId}/${dateString}?$format=JSON`;
            
            console.log(`正在請求時刻表資料...\n目標車站ID: ${stationId}\n日期: ${dateString}\nAPI URL: ${apiUrl}`);

            try {
                const response = await fetch(apiUrl, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                // 檢查是否為陣列，避免 API 回傳錯誤訊息物件時導致 forEach 崩潰
                if (!Array.isArray(data)) {
                    console.error("❌ TDX API 回傳格式錯誤或無資料。API原始回傳內容:", data);
                    return getMockTrainData();
                }

                console.log(`✅ 成功抓取時刻表！共取得 ${data.length} 筆班次資料。`);

                let southLast = null;
                let northLast = null;

                // 遍歷所有班次
                data.forEach(item => {
                    const direction = item.Direction; // 0:順行(南下), 1:逆行(北上)
                    const departureTime = item.DepartureTime;
                    // 使用可選串連 (?.) 確保物件屬性不存在時不會噴錯，並加入備用字串
                    const destination = item.DestinationStationName?.En || item.DestinationStationName?.Zh_tw || 'UNKNOWN';

                    if (direction === 0) {
                        // 如果這班車比目前記錄的還晚，就更新
                        if (!southLast || departureTime > southLast.time) {
                            southLast = { time: departureTime, destination: destination, trainNo: item.TrainNo };
                        }
                    } else if (direction === 1) {
                        if (!northLast || departureTime > northLast.time) {
                            northLast = { time: departureTime, destination: destination, trainNo: item.TrainNo };
                        }
                    }
                });

                const result = {
                    south: southLast || { time: '--:--', destination: 'NONE' },
                    north: northLast || { time: '--:--', destination: 'NONE' }
                };

                // 在 Console 詳細印出最終過濾出來的末班車資訊
                console.log("=== 今日末班車資訊結算 ===");
                if(southLast) {
                    console.log(`🚅 [順行/南下] 最晚班次: ${southLast.trainNo} 次, 發車時間: ${southLast.time}, 開往: ${southLast.destination}`);
                } else {
                    console.log(`🚅 [順行/南下] 找不到任何班次資料。`);
                }
                
                if(northLast) {
                    console.log(`🚅 [逆行/北上] 最晚班次: ${northLast.trainNo} 次, 發車時間: ${northLast.time}, 開往: ${northLast.destination}`);
                } else {
                     console.log(`🚅 [逆行/北上] 找不到任何班次資料。`);
                }
                console.log("=========================");

                return result;

            } catch (error) {
                console.error('❌ 獲取時刻表發生網路錯誤:', error);
                return getMockTrainData();
            }
        }

        // ==========================================
        // 4. 主流程：定位 -> 算距離 -> 抓班表 -> 顯示
        // ==========================================
        async function processAndShow(lat, lon) {
            let nearestStation = null;
            let minDistance = Infinity;

            // 1. 找出最近車站
            stations.forEach(station => {
                const dist = getDistanceFromLatLonInKm(lat, lon, station.lat, station.lon);
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestStation = station;
                }
            });

            if (nearestStation) {
                // 更新按鈕狀態提示使用者正在抓時刻表
                btn.textContent = 'FETCHING TRAINS...';

                // 2. 抓取最晚班次資料 (這裡加入 await 等待網路請求)
                const lastTrains = await fetchLastTrains(nearestStation.id);

                // 3. 更新畫面資料
                btn.style.opacity = '0';
                
                setTimeout(() => {
                    btn.style.display = 'none';
                    
                    // 填入站名
                    stationNameEl.textContent = nearestStation.name.toUpperCase();
                    
                    // 填入班次資訊 (轉大寫以符合 Bebas Neue 字型風格)
                    southTimeEl.textContent = lastTrains.south.time;
                    southDestEl.textContent = lastTrains.south.destination.toUpperCase();
                    northTimeEl.textContent = lastTrains.north.time;
                    northDestEl.textContent = lastTrains.north.destination.toUpperCase();

                    // 顯示站名跑馬燈
                    resultContainer.style.display = 'flex';
                    setTimeout(() => {
                        resultContainer.style.opacity = '1';
                        
                        // 稍微延遲一下，再秀出下方班次卡片，營造進場層次感
                        setTimeout(() => {
                            trainInfoEl.style.display = 'flex';
                            setTimeout(() => {
                                trainInfoEl.style.opacity = '1';
                            }, 50);
                        }, 800);

                    }, 50);
                }, 500); 
            }
        }

        // 按鈕點擊事件 (請求定位)
        btn.addEventListener('click', () => {
            btn.textContent = 'LOCATING...';
            btn.style.transform = 'scale(0.95)';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        processAndShow(position.coords.latitude, position.coords.longitude);
                    },
                    (error) => {
                        console.warn('定位受限或失敗，改用預設座標 (新北市蘆洲區):', error.message || error);
                        // 預設 fallback 座標：蘆洲區 (Lat: 25.0822, Lon: 121.4655)
                        processAndShow(25.0822, 121.4655);
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            } else {
                btn.textContent = 'NOT SUPPORTED';
            }
        });
