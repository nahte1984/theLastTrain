    <style>
        /* 定義字型備用機制，若 Bitcount Single 讀取失敗，將使用其他像素字型 */
        @import url('https://fonts.googleapis.com/css2?family=Bitcount+Single&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #313131; /* 1. 背景顏色：#313131 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
            transition: background-color 0.5s ease;
        }

        /* 按鈕樣式 */
        #btn-miss-you {
            background-color: #ffffff; /* 白底 */
            color: #313131; /* 修改：文字顏色為 #313131 */
            font-family: 'Bebas Neue', sans-serif; /* 字型 Bebas Neue */
            font-size: clamp(20px, 5vw, 24px); 
            /* 修改 1：字距設定為 2px，與站名上方小字 (subtitle) 保持一致 */
            letter-spacing: 2px; 
            border: none;
            border-radius: 999px; /* 圓角按鈕 */
            /* 修改 2：廢棄 % 單位，改用 em 來設定 padding，讓按鈕在任何裝置上比例都完美不擠壓 */
            padding: 1em 3em; 
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, opacity 0.5s ease;
            line-height: 1;
            text-align: center;
        }

        #btn-miss-you:hover {
            transform: scale(1.05);
        }

        #btn-miss-you:active {
            transform: scale(0.95);
        }

        /* 結果顯示區塊，預設隱藏 */
        #result-container {
            display: none; /* 初始隱藏 */
            flex-direction: column;
            justify-content: center;
            align-items: center; /* 4. 上下左右置中對齊 */
            opacity: 0;
            transition: opacity 1s ease-in-out;
            text-align: center;
            /* 讓跑馬燈不要超出螢幕寬度，並隱藏超出的部分 */
            width: 100vw;
            overflow: hidden; 
        }

        /* 站名上方的小字 */
        #subtitle {
            color: #8e8d8d; /* 顏色 #8e8d8d */
            font-family: 'Bebas Neue', sans-serif; /* 字型 Bebas Neue */
            font-size: clamp(16px, 4vw, 24px);
            letter-spacing: 2px;
            /* 修改 2：縮小下方 margin，拉近與站名的距離 */
            margin-bottom: 10px; 
            /* 修改 2：確保小字在站名上層，避免被大字的行高遮擋 */
            position: relative;
            z-index: 10;
        }

        /* 跑馬燈外層容器，確保佔滿寬度且隱藏超出的字 */
        .marquee-wrapper {
            width: 100%;
            overflow: hidden;
            white-space: nowrap; /* 強制不換行 */
        }

        /* 跑馬燈動畫設定 */
        @keyframes scroll-left {
            0% {
                transform: translateX(100vw); /* 從畫面最右邊開始 */
            }
            100% {
                transform: translateX(-100%); /* 走到完全超出畫面左邊 */
            }
        }

        /* 火車站站名英文 */
        #station-name {
            color: #6cdd96; /* 顏色 #6cdd96 */
            font-family: 'Bitcount Single', 'Silkscreen', 'DotGothic16', monospace; 
            /* 修改 3：字體大小加大兩倍，最大支援到 620px */
            font-size: clamp(120px, 30vw, 620px); 
            font-weight: 400;
            margin: 0;
            text-transform: uppercase;
            /* 修改 2：縮小行高 (line-height) 讓文字更緊湊 */
            line-height: 0.8; 
            
            /* 跑馬燈專屬設定 */
            display: inline-block; /* 必須是 inline-block 才能正確滾動 */
            white-space: nowrap; /* 絕對不換行 */
            padding-right: 50px; /* 給字尾留一點空間 */
            
            /* 動畫屬性：名稱 時間 線性勻速 無限循環 */
            /* 這裡設定 15 秒，你可以調整時間來改變跑馬燈速度 */
            animation: scroll-left 15s linear infinite; 
        }

        // 綁定網頁元素
        const btn = document.getElementById('btn-miss-you');
        const resultContainer = document.getElementById('result-container');
        const stationNameEl = document.getElementById('station-name');

        // Haversine 公式：用來計算地球上兩個座標(經緯度)之間的最短直線距離 (公里)
        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; // 地球半徑 (公里)
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a =
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }

        // 角度轉弧度
        function deg2rad(deg) {
            return deg * (Math.PI / 180);
        }

        // 處理並顯示最近車站的共用函式
        function showNearestStation(lat, lon) {
            let nearestStation = null;
            let minDistance = Infinity;

            // 比對所有車站，找出距離最短的那一個
            stations.forEach(station => {
                const dist = getDistanceFromLatLonInKm(lat, lon, station.lat, station.lon);
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestStation = station;
                }
            });

            // 找到後更新畫面
            if (nearestStation) {
                // 隱藏原本的按鈕
                btn.style.opacity = '0';
                
                setTimeout(() => {
                    btn.style.display = 'none';
                    
                    // 填入最近的站名 (強制轉為全大寫避免字型出錯)
                    stationNameEl.textContent = nearestStation.name.toUpperCase();
                    
                    // 顯示結果區塊
                    resultContainer.style.display = 'flex';
                    // 給一點點時間讓瀏覽器渲染 display: flex 後，再觸發 opacity 動畫
                    setTimeout(() => {
                        resultContainer.style.opacity = '1';
                    }, 50);
                }, 500); // 配合 CSS 轉場時間
            }
        }

        // 點擊按鈕事件
        btn.addEventListener('click', () => {
            // 變更按鈕文字，提示正在定位
            btn.textContent = 'LOCATING...';
            btn.style.transform = 'scale(0.95)';

            // 檢查瀏覽器是否支援 Geolocation
            if (navigator.geolocation) {
                // 要求取得目前位置
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        showNearestStation(position.coords.latitude, position.coords.longitude);
                    },
                    (error) => {
                        // 若使用者拒絕定位、環境受限或發生超時，改用備用座標
                        console.warn('定位受限或失敗，改用預設座標 (新北市蘆洲區):', error.message || error);
                        // 預設 fallback 座標：蘆洲區 (Lat: 25.0822, Lon: 121.4655)
                        showNearestStation(25.0822, 121.4655);
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            } else {
                // 瀏覽器不支援
                btn.textContent = 'NOT SUPPORTED';
            }
        });
